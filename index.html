<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AI Chat</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f6f6f4;
  --panel: #ffffff;
  --main: #fbfbfa;
  --card: #ffffff;
  --text: #111111;
  --muted: #777777;
  --muted-2: #999999;
  --line: #e7e7e4;
  --soft: #f0f0ed;
  --hover: #eeeeeb;
  --black: #111111;
  --white: #ffffff;
  --danger: #b91c1c;
  --shadow: 0 18px 60px rgba(0,0,0,0.08);
  --radius: 18px;
}

[data-theme="dark"] {
  --bg: #0d0d0d;
  --panel: #151515;
  --main: #101010;
  --card: #1a1a1a;
  --text: #f4f4f4;
  --muted: #a5a5a5;
  --muted-2: #777777;
  --line: #292929;
  --soft: #202020;
  --hover: #262626;
  --black: #f4f4f4;
  --white: #111111;
  --shadow: 0 18px 60px rgba(0,0,0,0.4);
}

html,
body {
  height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.app {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: grid;
  grid-template-columns: 290px 1fr;
  overflow: hidden;
}

/* Sidebar */

.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.side-top {
  padding: calc(18px + env(safe-area-inset-top)) 14px 14px;
  border-bottom: 1px solid var(--line);
}

.brand {
  margin-bottom: 16px;
}

.brand-title {
  font-size: 21px;
  font-weight: 850;
  letter-spacing: -0.05em;
}

.brand-subtitle {
  color: var(--muted);
  font-size: 12px;
  margin-top: 3px;
}

.primary-btn {
  width: 100%;
  border: 0;
  border-radius: 14px;
  background: var(--black);
  color: var(--white);
  padding: 12px 14px;
  font-weight: 800;
}

.primary-btn:hover {
  opacity: 0.86;
}

.side-actions {
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  border-bottom: 1px solid var(--line);
}

.small-btn {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--text);
  border-radius: 13px;
  padding: 10px 11px;
  font-size: 13px;
  font-weight: 750;
}

.small-btn:hover {
  background: var(--hover);
}

.chat-list {
  flex: 1;
  overflow: auto;
  padding: 10px;
}

.group-title {
  padding: 14px 8px 7px;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.chat-item {
  border: 1px solid transparent;
  border-radius: 15px;
  padding: 11px;
  cursor: pointer;
  margin-bottom: 6px;
  display: grid;
  gap: 5px;
}

.chat-item:hover {
  background: var(--hover);
}

.chat-item.active {
  background: var(--soft);
  border-color: var(--line);
}

.chat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.chat-title {
  font-size: 13.5px;
  font-weight: 850;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.chat-preview {
  color: var(--muted);
  font-size: 12px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.chat-tools {
  display: none;
  gap: 4px;
  flex-shrink: 0;
}

.chat-item:hover .chat-tools,
.chat-item.active .chat-tools {
  display: flex;
}

.mini-btn {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--muted);
  border-radius: 8px;
  padding: 3px 6px;
  font-size: 11px;
}

.mini-btn:hover {
  color: var(--text);
  background: var(--hover);
}

/* Main */

.main {
  min-width: 0;
  background: var(--main);
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  height: 100dvh;
}

.header {
  padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
  border-bottom: 1px solid var(--line);
  background: rgba(251,251,250,0.86);
  backdrop-filter: blur(14px);
  display: flex;
  align-items: center;
  gap: 10px;
}

[data-theme="dark"] .header {
  background: rgba(16,16,16,0.86);
}

.mobile-menu {
  display: none;
}

.icon-btn {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--text);
  border-radius: 12px;
  padding: 9px 11px;
  font-size: 12.5px;
  font-weight: 800;
}

.icon-btn:hover {
  background: var(--hover);
}

.icon-btn.danger {
  color: var(--danger);
}

.title-input {
  flex: 1;
  min-width: 0;
  border: 0;
  outline: none;
  background: transparent;
  color: var(--text);
  padding: 8px 9px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 850;
}

.title-input:focus {
  background: var(--soft);
}

.header-meta {
  max-width: 320px;
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-actions {
  display: flex;
  gap: 7px;
}

.messages {
  overflow: auto;
  padding: 26px 18px 30px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.empty {
  margin: auto;
  text-align: center;
  color: var(--muted);
  line-height: 1.7;
  max-width: 540px;
  padding: 30px 20px;
}

.empty strong {
  display: block;
  color: var(--text);
  font-size: 30px;
  letter-spacing: -0.07em;
  margin-bottom: 8px;
}

.stage-line {
  max-width: 860px;
  width: 100%;
  align-self: center;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--muted);
  font-size: 12px;
}

.stage-line::before,
.stage-line::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

.message {
  display: flex;
  gap: 11px;
  max-width: 900px;
  width: 100%;
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message.assistant,
.message.system {
  align-self: flex-start;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 13px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  background: var(--soft);
  color: var(--text);
  font-size: 12px;
  font-weight: 900;
}

.avatar.assistant {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}

.message-body {
  max-width: calc(100% - 45px);
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.message.user .message-body {
  align-items: flex-end;
}

.bubble {
  border-radius: 20px;
  padding: 13px 16px;
  line-height: 1.72;
  font-size: 14.5px;
  word-break: break-word;
}

.bubble.user {
  background: var(--black);
  color: var(--white);
  border-bottom-right-radius: 6px;
  white-space: pre-wrap;
}

.bubble.assistant {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--line);
  border-bottom-left-radius: 6px;
}

.bubble.system {
  background: var(--soft);
  color: var(--muted);
  border: 1px solid var(--line);
  border-bottom-left-radius: 6px;
  white-space: pre-wrap;
  font-size: 13px;
}

.msg-actions {
  display: flex;
  gap: 5px;
  opacity: 0;
  transition: opacity 0.15s ease;
  flex-wrap: wrap;
}

.message:hover .msg-actions {
  opacity: 1;
}

.msg-action {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--muted);
  border-radius: 9px;
  padding: 4px 8px;
  font-size: 12px;
}

.msg-action:hover {
  background: var(--hover);
  color: var(--text);
}

.bubble p {
  margin: 0 0 10px;
}

.bubble p:last-child {
  margin-bottom: 0;
}

.bubble h1,
.bubble h2,
.bubble h3 {
  margin: 12px 0 8px;
  line-height: 1.3;
}

.bubble h1 { font-size: 21px; }
.bubble h2 { font-size: 18px; }
.bubble h3 { font-size: 16px; }

.bubble ul,
.bubble ol {
  margin: 8px 0 10px 22px;
}

.bubble li {
  margin: 4px 0;
}

.bubble blockquote {
  margin: 10px 0;
  padding: 8px 12px;
  border-left: 3px solid var(--text);
  background: var(--soft);
  border-radius: 0 12px 12px 0;
  color: var(--muted);
}

.bubble a {
  color: var(--text);
  text-decoration: underline;
}

.inline-code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  background: var(--soft);
  border: 1px solid var(--line);
  padding: 1px 5px;
  border-radius: 6px;
  font-size: 0.92em;
}

.bubble.user .inline-code {
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.24);
}

.codebox {
  margin: 12px 0;
  border-radius: 15px;
  overflow: hidden;
  background: #111111;
  color: #f4f4f5;
  border: 1px solid #252525;
}

.codebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #191919;
  border-bottom: 1px solid #2b2b2b;
  padding: 8px 10px;
}

.code-lang {
  color: #a1a1aa;
  font-size: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.copy-code {
  border: 1px solid #3a3a3a;
  background: #222222;
  color: #f4f4f5;
  border-radius: 9px;
  padding: 5px 9px;
  font-size: 12px;
}

pre {
  margin: 0;
  padding: 14px;
  overflow: auto;
}

pre code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
}

.uploaded-image {
  max-width: 240px;
  max-height: 240px;
  border-radius: 14px;
  border: 1px solid var(--line);
  display: block;
  margin-top: 8px;
}

/* Composer */

.composer {
  border-top: 1px solid var(--line);
  background: var(--main);
  padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
}

.composer-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.image-preview {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.thumb {
  position: relative;
  width: 64px;
  height: 64px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line);
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb button {
  position: absolute;
  top: 4px;
  right: 4px;
  border: 0;
  background: rgba(0,0,0,0.72);
  color: white;
  border-radius: 999px;
  width: 19px;
  height: 19px;
  font-size: 12px;
}

.input-box {
  border: 1.5px solid var(--line);
  background: var(--card);
  border-radius: 22px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 9px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.035);
}

.input-box:focus-within {
  border-color: var(--text);
}

textarea {
  flex: 1;
  min-height: 30px;
  max-height: 190px;
  resize: none;
  outline: none;
  border: 0;
  background: transparent;
  color: var(--text);
  padding: 6px 5px;
  line-height: 1.55;
}

.input-actions {
  display: flex;
  gap: 7px;
}

.attach-btn,
.send-btn {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 850;
  background: var(--card);
  color: var(--text);
}

.attach-btn:hover {
  background: var(--hover);
}

.send-btn {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
  min-width: 62px;
}

.send-btn.stop {
  background: var(--danger);
  border-color: var(--danger);
  color: white;
}

.hint-line {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
}

/* Dialog */

dialog {
  width: min(760px, calc(100vw - 22px));
  max-height: min(90vh, 760px);
  border: 0;
  border-radius: 24px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  overflow: hidden;
}

dialog::backdrop {
  background: rgba(0,0,0,0.42);
  backdrop-filter: blur(5px);
}

.dialog-head {
  padding: 17px 19px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.dialog-head h2 {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.03em;
}

.dialog-body {
  padding: 17px 19px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: auto;
  max-height: calc(min(90vh, 760px) - 125px);
}

.dialog-foot {
  padding: 13px 19px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.section-title {
  font-size: 13px;
  font-weight: 900;
  color: var(--text);
  margin-top: 3px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

label {
  display: block;
}

.label-text {
  display: block;
  font-size: 12px;
  font-weight: 900;
  color: var(--muted);
  margin-bottom: 6px;
}

.field {
  width: 100%;
  border: 1.5px solid var(--line);
  background: var(--main);
  color: var(--text);
  border-radius: 14px;
  padding: 11px 12px;
  outline: none;
}

.field:focus {
  border-color: var(--text);
}

.field-textarea {
  min-height: 92px;
  resize: vertical;
}

.dialog-note {
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: 15px;
  padding: 12px 13px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.btn {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--text);
  border-radius: 13px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 800;
}

.btn:hover {
  background: var(--hover);
}

.btn-primary {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}

.btn-danger {
  color: var(--danger);
}

/* Memory */

.memory-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 10px;
}

.memory-card {
  border: 1px solid var(--line);
  background: var(--main);
  border-radius: 17px;
  padding: 13px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.memory-card.off {
  opacity: 0.55;
}

.memory-title {
  font-weight: 900;
  font-size: 14px;
}

.memory-content {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
  white-space: pre-wrap;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.memory-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.memory-actions button {
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 9px;
}

.status {
  font-size: 12px;
  color: var(--muted);
}

.toast {
  position: fixed;
  left: 50%;
  bottom: calc(18px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(8px);
  background: #111111;
  color: white;
  border-radius: 14px;
  padding: 10px 15px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.18s ease, transform 0.18s ease;
  pointer-events: none;
  z-index: 99;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 780px) {
  .app {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: fixed;
    z-index: 50;
    inset: 0 auto 0 0;
    width: min(86vw, 315px);
    transform: translateX(-105%);
    transition: transform 0.2s ease;
    box-shadow: var(--shadow);
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .mobile-menu {
    display: inline-block;
  }

  .header-meta {
    display: none;
  }

  .header-actions {
    gap: 5px;
  }

  .icon-btn {
    padding: 8px 9px;
  }

  .field-row {
    grid-template-columns: 1fr;
  }

  .messages {
    padding: 18px 10px 22px;
  }

  .message {
    max-width: 98%;
  }

  .composer {
    padding-left: 10px;
    padding-right: 10px;
  }

  .hint-line {
    display: none;
  }
}
</style>
</head>

<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="side-top">
      <div class="brand">
        <div class="brand-title">AI Chat</div>
        <div class="brand-subtitle">本地 Key · 记忆 · 阶段上下文</div>
      </div>
      <button class="primary-btn" id="newChatBtn">新建对话</button>
    </div>

    <div class="side-actions">
      <button class="small-btn" id="settingsBtn">设置</button>
      <button class="small-btn" id="memoryBtn">记忆</button>
      <button class="small-btn" id="themeBtn">主题</button>
      <button class="small-btn" id="resetBtn">重置</button>
    </div>

    <div class="chat-list" id="chatList"></div>
    <input id="importFile" type="file" accept="application/json,.json" hidden />
  </aside>

  <main class="main">
    <header class="header">
      <button class="icon-btn mobile-menu" id="openSideBtn">菜单</button>
      <input class="title-input" id="titleInput" value="新对话" title="可直接编辑对话名" />
      <span class="header-meta" id="headerMeta">未配置 API</span>
      <div class="header-actions">
        <button class="icon-btn" id="stageBtn">新阶段</button>
        <button class="icon-btn" id="regenBtn">重答</button>
        <button class="icon-btn danger" id="deleteBtn">删除</button>
      </div>
    </header>

    <section class="messages" id="messages"></section>

    <footer class="composer">
      <div class="composer-inner">
        <div class="image-preview" id="imagePreview"></div>
        <div class="input-box">
          <textarea id="promptInput" rows="1" placeholder="输入消息。Enter 发送，Shift + Enter 换行。"></textarea>
          <div class="input-actions">
            <button class="attach-btn" id="imageBtn">图片</button>
            <button class="send-btn" id="sendBtn">发送</button>
          </div>
        </div>
        <div class="hint-line">当前阶段之前的消息不会发送给 AI；启用的记忆卡片始终会加入系统提示词。</div>
      </div>
      <input id="imageInput" type="file" accept="image/*" multiple hidden />
    </footer>
  </main>
</div>

<dialog id="settingsDialog">
  <form id="settingsForm">
    <div class="dialog-head">
      <h2>设置</h2>
      <button type="button" class="btn" id="closeSettingsBtn">关闭</button>
    </div>

    <div class="dialog-body">
      <div class="dialog-note">
        API URL、API Key、聊天记录、阶段位置和记忆卡片都只保存在当前浏览器 localStorage。
        如果接口不允许浏览器跨域请求，页面会请求失败，这属于服务端限制。
      </div>

      <div class="section-title">API 配置</div>

      <label>
        <span class="label-text">API URL</span>
        <input class="field" id="apiUrlInput" placeholder="https://api.openai.com/v1/chat/completions" />
      </label>

      <label>
        <span class="label-text">API Key</span>
        <input class="field" id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />
      </label>

      <div class="field-row">
        <label>
          <span class="label-text">模型名</span>
          <input class="field" id="modelInput" placeholder="gpt-4o-mini / gpt-4.1-mini / deepseek-chat" />
        </label>

        <label>
          <span class="label-text">Temperature</span>
          <input class="field" id="temperatureInput" type="number" min="0" max="2" step="0.1" placeholder="0.7" />
        </label>
      </div>

      <div class="section-title">上下文和输出</div>

<dialog id="memoryDialog">

      启用的记忆会自动加入系统提示词。开启“新阶段”后，AI 看不到旧聊天记录，但仍然能看到这些启用的记忆卡片。
    </div>

    <form id="memoryForm">

        <label>

            <option value="true">启用</option>
            <option value="false">停用</option>

      <label style="margin-top:12px;">

        <button type="submit" class="btn btn-primary">保存记忆</button>

        <button type="button" class="btn" id="aiMemoryBtn">AI 整理记忆</button>
      </div>
    </form>

    <div class="memory-grid" id="memoryGrid"></div>
  </div>

<div class="toast" id="toast"></div>

<script>
const STORE_KEY = "ai-chat-frontend-stage-v2";

function makeId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function defaultState() {
  return {
    theme: "light",
    settings: {
      apiUrl: "https://api.openai.com/v1/chat/completions",
      apiKey: "",
      model: "gpt-4o-mini",
      temperature: 0.7,
      maxTokens: "",
      contextLimit: 64,
      systemPrompt: "你是一个耐心、清楚、实用的中文 AI 助手。"
    },
    memories: [
      {
        id: makeId(),
        title: "回答偏好",
        content: "用中文回答。解释要清楚，但不要太啰嗦。涉及代码时优先给完整可复制版本。",
        enabled: true,
        source: "user"
      },
      {
        id: makeId(),
        title: "项目偏好",
        content: "喜欢单文件 HTML 工具。优先考虑 iPad、手机和 GitHub Pages 也能使用。数据尽量保存在浏览器本地。",
        enabled: true,
        source: "user"
      }
    ],
    currentChatId: "",
    chats: []
  };
}

let state = loadState();
let isSending = false;
let abortController = null;
let pendingImages = [];
let editingMemoryId = null;

const $ = selector => document.querySelector(selector);
const $$ = selector => Array.from(document.querySelectorAll(selector));

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultState();

    const saved = JSON.parse(raw);
    const base = defaultState();

    return {
      ...base,
      ...saved,
      settings: { ...base.settings, ...(saved.settings || {}) },
      memories: Array.isArray(saved.memories) ? saved.memories : base.memories,
      chats: Array.isArray(saved.chats) ? saved.chats.map(normalizeChat) : []
    };
  } catch (error) {
    return defaultState();
  }
}

function normalizeChat(chat) {
  return {
    id: chat.id || makeId(),
    title: chat.title || "新对话",
    createdAt: chat.createdAt || new Date().toISOString(),
    updatedAt: chat.updatedAt || new Date().toISOString(),
    stageStartIndex: Number(chat.stageStartIndex || 0),
    messages: Array.isArray(chat.messages) ? chat.messages : []
  };
}

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function escapeHtml(text) {
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function showToast(message) {
  const toast = $("#toast");
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
}

function applyTheme() {
  document.documentElement.setAttribute("data-theme", state.theme || "light");
}

function createChat() {
  return {
    id: makeId(),
    title: "新对话",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    stageStartIndex: 0,
    messages: []
  };
}

function ensureChat() {
  if (state.currentChatId && state.chats.some(chat => chat.id === state.currentChatId)) return;

  const chat = createChat();
  state.chats.unshift(chat);
  state.currentChatId = chat.id;
  saveState();
}

function currentChat() {
  ensureChat();
  return state.chats.find(chat => chat.id === state.currentChatId);
}

function textFromContent(content) {
  if (typeof content === "string") return content;

  if (Array.isArray(content)) {
    return content.map(part => {
      if (part.type === "text") return part.text;
      if (part.type === "image_url") return "[图片]";
      return "";
    }).join("\n").trim();
  }

  return String(content ?? "");
}

function replaceTextInContent(oldContent, newText) {
  if (typeof oldContent === "string") return newText;

  if (Array.isArray(oldContent)) {
    let used = false;

    const next = oldContent.map(part => {
      if (part.type === "text" && !used) {
        used = true;
        return { ...part, text: newText };
      }
      return part;
    });

    if (!used && newText.trim()) {
      next.unshift({ type: "text", text: newText });
    }

    return next;
  }

  return newText;
}

function formatTime() {
  const date = new Date();
  const h = String(date.getHours()).padStart(2, "0");
  const m = String(date.getMinutes()).padStart(2, "0");
  return h + ":" + m;
}

function render() {
  ensureChat();
  applyTheme();
  renderHeader();
  renderChatList();
  renderMessages();
  renderImagePreview();
  saveState();
}

function renderHeader() {
  const chat = currentChat();
  $("#titleInput").value = chat.title || "新对话";

  const enabledMemoryCount = state.memories.filter(m => m.enabled).length;
  const model = state.settings.model || "未设置模型";
  const limit = Number(state.settings.contextLimit || 0);
  const stageText = chat.stageStartIndex > 0 ? "新阶段中" : "完整阶段";
  const contextText = limit > 0 ? "上下文 " + limit : "上下文全部";

  $("#headerMeta").textContent = state.settings.apiKey
    ? model + " · " + contextText + " · " + stageText + " · " + enabledMemoryCount + " 条记忆"
    : "未配置 API";
}

function groupName(chat) {
  const updated = new Date(chat.updatedAt || chat.createdAt);
  const now = new Date();
  const diff = (now - updated) / 86400000;

  if (diff < 1) return "今天";
  if (diff < 2) return "昨天";
  if (diff < 7) return "近 7 天";
  return "更早";
}

function renderChatList() {
  const groups = { "今天": [], "昨天": [], "近 7 天": [], "更早": [] };

  state.chats.forEach(chat => {
    groups[groupName(chat)].push(chat);
  });

  let html = "";

  Object.keys(groups).forEach(name => {
    if (!groups[name].length) return;

    html += '<div class="group-title">' + name + '</div>';

    groups[name].forEach(chat => {
      const last = [...chat.messages].reverse().find(m => m.role !== "system");
      const preview = last ? textFromContent(last.content).slice(0, 72) : "空对话";
      const stageBadge = chat.stageStartIndex > 0 ? " · 新阶段" : "";

      html += `
        <div class="chat-item ${chat.id === state.currentChatId ? "active" : ""}" data-chat-id="${chat.id}">
          <div class="chat-row">
            <div class="chat-title">${escapeHtml(chat.title || "新对话")}</div>
            <div class="chat-tools">
              <button class="mini-btn" onclick="renameChat('${chat.id}', event)">改名</button>
              <button class="mini-btn" onclick="deleteChatById('${chat.id}', event)">删</button>
            </div>
          </div>
          <div class="chat-preview">${escapeHtml(preview + stageBadge)}</div>
        </div>
      `;
    });
  });

  $("#chatList").innerHTML = html;
}

function renderMessages() {
  const chat = currentChat();
  const box = $("#messages");

  if (!chat.messages.length) {
    box.innerHTML = `
      <div class="empty">
        <strong>AI Chat</strong>
        干净的本地 AI 聊天前端。支持 64 条上下文、新阶段截断、记忆卡片、图片输入、消息编辑和从任意位置重新回复。
      </div>
    `;
    return;
  }

  let html = "";

  chat.messages.forEach((message, index) => {
    if (index === chat.stageStartIndex && chat.stageStartIndex > 0) {
      html += '<div class="stage-line">新阶段开始：AI 不会看到此线之前的聊天记录</div>';
    }

    html += messageHtml(message, index);
  });

  box.innerHTML = html;
  bindCopyCodeButtons();
  box.scrollTop = box.scrollHeight;
}

function messageHtml(message, index) {
  const role = message.role || "assistant";

  if (role === "system") {
    return `
      <div class="message system">
        <div class="avatar assistant">记</div>
        <div class="message-body">
          <div class="bubble system">${escapeHtml(textFromContent(message.content))}</div>
          <div class="msg-actions">
            <button class="msg-action" onclick="deleteMessage(${index})">删除</button>
          </div>
        </div>
      </div>
    `;
  }

  const isUser = role === "user";

  const avatar = isUser
    ? '<div class="avatar">我</div>'
    : '<div class="avatar assistant">AI</div>';

  const bubble = isUser
    ? '<div class="bubble user">' + renderUserContent(message.content) + '</div>'
    : '<div class="bubble assistant">' + renderMarkdown(textFromContent(message.content)) + '</div>';

  const actions = `
    <button class="msg-action" onclick="editMessage(${index})">编辑</button>
    <button class="msg-action" onclick="replyFromMessage(${index})">从此重答</button>
    <button class="msg-action" onclick="copyMessage(${index})">复制</button>
    ${isUser ? "" : '<button class="msg-action" onclick="saveMessageAsMemory(' + index + ')">存为记忆</button>'}
    <button class="msg-action" onclick="deleteMessage(${index})">删除</button>
  `;

  return `
    <div class="message ${role}">
      ${avatar}
      <div class="message-body">
        ${bubble}
        <div class="msg-actions">${actions}</div>
      </div>
    </div>
  `;
}

function renderUserContent(content) {
  if (typeof content === "string") return escapeHtml(content);
  if (!Array.isArray(content)) return escapeHtml(String(content ?? ""));

  return content.map(part => {
    if (part.type === "text") return escapeHtml(part.text);

    if (part.type === "image_url") {
      const url = part.image_url && part.image_url.url ? part.image_url.url : "";
      return '<img class="uploaded-image" src="' + escapeHtml(url) + '" alt="上传图片" />';
    }

    return "";
  }).join("\n");
}

function renderMarkdown(rawText) {
  let text = escapeHtml(rawText || "");
  const codeBlocks = [];

  text = text.replace(/```([\w#+.-]*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    const decoded = code
      .replaceAll("&lt;", "<")
      .replaceAll("&gt;", ">")
      .replaceAll("&amp;", "&")
      .replaceAll("&quot;", '"')
      .replaceAll("&#039;", "'");

    const token = "@@CODE_BLOCK_" + codeBlocks.length + "@@";

    codeBlocks.push({
      lang: lang || "code",
      code: decoded
    });

    return token;
  });

  text = text.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
  text = text.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  text = text.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  text = text.replace(/^# (.+)$/gm, "<h1>$1</h1>");
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  text = text.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");

  text = text.replace(/((?:^[-*] .+(?:\n|$))+)/gm, block => {
    const items = block.trim().split("\n").map(line => {
      return "<li>" + line.replace(/^[-*] /, "") + "</li>";
    }).join("");
    return "<ul>" + items + "</ul>";
  });

  text = text.replace(/((?:^\d+\. .+(?:\n|$))+)/gm, block => {
    const items = block.trim().split("\n").map(line => {
      return "<li>" + line.replace(/^\d+\. /, "") + "</li>";
    }).join("");
    return "<ol>" + items + "</ol>";
  });

  text = text.split(/\n{2,}/).map(part => {
    const trimmed = part.trim();
    if (!trimmed) return "";

    if (
      trimmed.startsWith("<h1") ||
      trimmed.startsWith("<h2") ||
      trimmed.startsWith("<h3") ||
      trimmed.startsWith("<ul") ||
      trimmed.startsWith("<ol") ||
      trimmed.startsWith("<blockquote") ||
      trimmed.startsWith("@@CODE_BLOCK_")
    ) {
      return trimmed.replaceAll("\n", "<br>");
    }

    return "<p>" + trimmed.replaceAll("\n", "<br>") + "</p>";
  }).join("");

  codeBlocks.forEach((block, index) => {
    const html = `
      <div class="codebox">
        <div class="codebar">
          <span class="code-lang">${escapeHtml(block.lang)}</span>
          <button class="copy-code" data-code-index="${index}">复制代码</button>
        </div>
        <pre><code>${escapeHtml(block.code)}</code></pre>
      </div>
    `;

    text = text.replace("@@CODE_BLOCK_" + index + "@@", html);
  });

  window.currentCodeBlocks = codeBlocks;
  return text;
}

function bindCopyCodeButtons() {
  $$(".copy-code").forEach(button => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.codeIndex);
      const block = window.currentCodeBlocks && window.currentCodeBlocks[index];

      if (!block) return;

      navigator.clipboard.writeText(block.code);
      button.textContent = "已复制";
      setTimeout(() => button.textContent = "复制代码", 1200);
    });
  });
}

function enabledMemories() {
  return state.memories.filter(memory => memory.enabled && memory.content.trim());
}

function buildSystemPrompt() {
  const base = state.settings.systemPrompt.trim();
  const memories = enabledMemories();

  if (!memories.length) return base;

  const memoryText = memories.map((memory, index) => {
    return (index + 1) + ". " + memory.title + "：" + memory.content;
  }).join("\n");

  return (base + "\n\n以下是用户保存的记忆卡片。即使当前对话开启了新阶段，你也只能依靠这些记忆和当前阶段内的消息来回答：\n" + memoryText).trim();
}

function buildApiMessages(chat) {
  const result = [];
  const systemPrompt = buildSystemPrompt();

  if (systemPrompt) {
    result.push({ role: "system", content: systemPrompt });
  }

  const stageStart = Number(chat.stageStartIndex || 0);

  let history = chat.messages
    .slice(stageStart)
    .filter(m => m.role === "user" || m.role === "assistant")
    .map(m => ({ role: m.role, content: m.content }));

  const limit = Number(state.settings.contextLimit || 0);

  if (limit > 0) {
    history = history.slice(-limit);
  }

  return result.concat(history);
}

async function callApi(messages, stream) {
  const settings = state.settings;

  if (!settings.apiUrl) throw new Error("请先填写 API URL。");
  if (!settings.apiKey) throw new Error("请先填写 API Key。");
  if (!settings.model) throw new Error("请先填写模型名。");

  const body = {
    model: settings.model,
    messages,
    temperature: Number(settings.temperature || 0.7),
    stream: Boolean(stream)
  };

  if (settings.maxTokens) {
    body.max_tokens = Number(settings.maxTokens);
  }

  const response = await fetch(settings.apiUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + settings.apiKey
    },
    body: JSON.stringify(body),
    signal: abortController ? abortController.signal : undefined
  });

  return response;
}

async function sendMessage() {
  if (isSending) {
    if (abortController) abortController.abort();
    return;
  }

  const input = $("#promptInput");
  const text = input.value.trim();

  if (!text && !pendingImages.length) return;

  const chat = currentChat();

  const content = pendingImages.length
    ? [
        ...(text ? [{ type: "text", text }] : []),
        ...pendingImages.map(image => ({
          type: "image_url",
          image_url: { url: image.url }
        }))
      ]
    : text;

  chat.messages.push({
    role: "user",
    content,
    time: formatTime()
  });

  if (!chat.title || chat.title === "新对话") {
    const titleSource = text || "图片对话";
    chat.title = titleSource.slice(0, 22) + (titleSource.length > 22 ? "…" : "");
  }

  chat.updatedAt = new Date().toISOString();
  input.value = "";
  pendingImages = [];
  autoResizeInput();
  render();

  await generateReply(chat);
}

async function generateReply(chat) {
  isSending = true;
  abortController = new AbortController();
  $("#sendBtn").classList.add("stop");
  $("#sendBtn").textContent = "停止";

  const assistantMessage = {
    role: "assistant",
    content: "",
    time: formatTime()
  };

  chat.messages.push(assistantMessage);
  renderMessages();

  try {
    const response = await callApi(buildApiMessages(chat), true);

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(errorText || "HTTP " + response.status);
    }

    if (!response.body) {
      throw new Error("当前浏览器或接口不支持流式响应。");
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const result = await reader.read();
      if (result.done) break;

      buffer += decoder.decode(result.value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;

        const data = line.slice(6).trim();
        if (data === "[DONE]") continue;

        try {
          const json = JSON.parse(data);
          const delta = json.choices && json.choices[0] && json.choices[0].delta
            ? json.choices[0].delta.content
            : "";

          if (delta) {
            assistantMessage.content += delta;
            updateLastAssistantBubble(assistantMessage.content);
          }
        } catch (error) {}
      }
    }

    chat.updatedAt = new Date().toISOString();

    if (!assistantMessage.content.trim()) {
      assistantMessage.content = "接口返回成功，但没有解析到文本内容。";
    }

    render();
  } catch (error) {
    if (error.name === "AbortError") {
      if (!assistantMessage.content) {
        chat.messages = chat.messages.filter(m => m !== assistantMessage);
      }
      render();
    } else {
      assistantMessage.role = "system";
      assistantMessage.content =
        "请求失败：" + error.message +
        "\n\n常见原因：API URL 写错、Key 无效、模型名不对、模型不支持图片，或服务端不允许浏览器跨域请求。";
      render();
    }
  } finally {
    isSending = false;
    abortController = null;
    $("#sendBtn").classList.remove("stop");
    $("#sendBtn").textContent = "发送";
  }
}

function updateLastAssistantBubble(content) {
  const assistantMessages = $$(".message.assistant");
  const last = assistantMessages[assistantMessages.length - 1];

  if (!last) return;

  const bubble = last.querySelector(".bubble.assistant");
  if (!bubble) return;

  bubble.innerHTML = renderMarkdown(content);
  bindCopyCodeButtons();

  const box = $("#messages");
  box.scrollTop = box.scrollHeight;
}

async function regenerateReply() {
  const chat = currentChat();

  const lastAssistant = [...chat.messages]
    .map((message, index) => ({ message, index }))
    .reverse()
    .find(item => item.message.role === "assistant");

  if (!lastAssistant) {
    showToast("没有可以重答的回复");
    return;
  }

  chat.messages = chat.messages.slice(0, lastAssistant.index);
  if (chat.stageStartIndex > chat.messages.length) chat.stageStartIndex = chat.messages.length;

  render();
  await generateReply(chat);
}

async function replyFromMessage(index) {
  const chat = currentChat();
  const message = chat.messages[index];

  if (!message || isSending) return;

  if (message.role === "assistant") {
    chat.messages = chat.messages.slice(0, index);
  } else {
    chat.messages = chat.messages.slice(0, index + 1);
  }

  if (chat.stageStartIndex > chat.messages.length) {
    chat.stageStartIndex = chat.messages.length;
  }

  chat.updatedAt = new Date().toISOString();
  render();

  const hasUserMessage = [...chat.messages].reverse().some(m => m.role === "user");

  if (!hasUserMessage) {
    showToast("前面没有用户消息，无法重答");
    return;
  }

  await generateReply(chat);
}

function startNewStage() {
  const chat = currentChat();

  if (!chat.messages.length) {
    showToast("当前对话还没有内容");
    return;
  }

  if (!confirm("开启新阶段后，AI 将看不到这之前的聊天记录，只能看到启用的记忆卡片和新阶段后的消息。确定开启吗？")) return;

  chat.stageStartIndex = chat.messages.length;
  chat.messages.push({
    role: "system",
    content: "已开启新阶段。AI 不会再读取此处之前的聊天记录，只会读取启用的记忆卡片和后续消息。",
    time: formatTime()
  });
  chat.stageStartIndex = chat.messages.length;
  chat.updatedAt = new Date().toISOString();

  render();
  showToast("已开启新阶段");
}

function newChat() {
  const chat = createChat();
  state.chats.unshift(chat);
  state.currentChatId = chat.id;
  render();
  closeSidebar();
}

function deleteCurrentChat() {
  if (!confirm("确定删除当前对话吗？")) return;
  deleteChatById(state.currentChatId);
}

function deleteChatById(id, event) {
  if (event) {
    event.stopPropagation();
  }

  const chat = state.chats.find(item => item.id === id);
  if (!chat) return;

  if (!confirm("确定删除对话「" + (chat.title || "新对话") + "」吗？")) return;

  state.chats = state.chats.filter(item => item.id !== id);

  if (state.currentChatId === id) {
    state.currentChatId = state.chats[0] ? state.chats[0].id : "";
  }

  render();
}

function renameChat(id, event) {
  if (event) {
    event.stopPropagation();
  }

  const chat = state.chats.find(item => item.id === id);
  if (!chat) return;

  const next = prompt("编辑对话名称：", chat.title || "新对话");
  if (next === null) return;

  chat.title = next.trim() || "新对话";
  chat.updatedAt = new Date().toISOString();

  render();
}

function copyMessage(index) {
  const message = currentChat().messages[index];
  if (!message) return;

  navigator.clipboard.writeText(textFromContent(message.content));
  showToast("已复制");
}

function deleteMessage(index) {
  const chat = currentChat();

  if (!chat.messages[index]) return;
  if (!confirm("确定删除这条消息吗？")) return;

  chat.messages.splice(index, 1);

  if (chat.stageStartIndex > index) {
    chat.stageStartIndex = Math.max(0, chat.stageStartIndex - 1);
  }

  if (chat.stageStartIndex > chat.messages.length) {
    chat.stageStartIndex = chat.messages.length;
  }

  chat.updatedAt = new Date().toISOString();
  render();
}

async function editMessage(index) {
  const chat = currentChat();
  const message = chat.messages[index];

  if (!message || message.role === "system") return;

  const oldText = textFromContent(message.content).replace(/\[图片\]/g, "").trim();
  const nextText = prompt("编辑消息内容：", oldText);

  if (nextText === null) return;

  message.content = replaceTextInContent(message.content, nextText.trim());
  chat.updatedAt = new Date().toISOString();

  render();

  if (message.role === "user") {
    const shouldRegen = confirm("是否从这条用户消息开始重新回复？\n这会删除它后面的消息。");
    if (shouldRegen) {
      await replyFromMessage(index);
    }
  }
}

function saveMessageAsMemory(index) {
  const content = textFromContent(currentChat().messages[index].content).trim();
  if (!content) return;

  state.memories.unshift({
    id: makeId(),
    title: content.slice(0, 24).replaceAll("\n", " ") + (content.length > 24 ? "…" : ""),
    content,
    enabled: true,
    source: "assistant"
  });

  saveState();
  renderHeader();
  showToast("已存为记忆");
}

function openSettings() {
  const s = state.settings;

  $("#apiUrlInput").value = s.apiUrl || "";
  $("#apiKeyInput").value = s.apiKey || "";
  $("#modelInput").value = s.model || "";
  $("#temperatureInput").value = s.temperature ?? 0.7;
  $("#maxTokensInput").value = s.maxTokens || "";
  $("#contextLimitInput").value = s.contextLimit ?? 64;
  $("#systemPromptInput").value = s.systemPrompt || "";

  $("#settingsDialog").showModal();
}

function saveSettings(event) {
  event.preventDefault();

  state.settings = {
    apiUrl: $("#apiUrlInput").value.trim(),
    apiKey: $("#apiKeyInput").value.trim(),
    model: $("#modelInput").value.trim(),
    temperature: Number($("#temperatureInput").value || 0.7),
    maxTokens: $("#maxTokensInput").value.trim(),
    contextLimit: Number($("#contextLimitInput").value || 64),
    systemPrompt: $("#systemPromptInput").value.trim()
  };

  saveState();
  renderHeader();
  $("#settingsDialog").close();
  showToast("设置已保存");
}

async function testConnection() {
  saveSettings(new Event("submit"));

  $("#testBtn").disabled = true;
  $("#testBtn").textContent = "测试中";

  try {
    abortController = new AbortController();

    const response = await callApi([
      { role: "user", content: "请只回复：OK" }
    ], false);

    const text = await response.text();
    let data = null;

    try {
      data = JSON.parse(text);
    } catch (error) {}

    if (!response.ok) {
      throw new Error(data && data.error ? data.error.message : text);
    }

    const reply =
      data &&
      data.choices &&
      data.choices[0] &&
      data.choices[0].message
        ? data.choices[0].message.content
        : "连接成功";

    showToast("测试成功：" + String(reply).slice(0, 30));
  } catch (error) {
    alert("测试失败：\n" + error.message);
  } finally {
    abortController = null;
    $("#testBtn").disabled = false;
    $("#testBtn").textContent = "测试连接";
  }
}

function openMemory() {
  editingMemoryId = null;
  clearMemoryForm();
  renderMemoryGrid();
  $("#memoryDialog").showModal();
}

function clearMemoryForm() {
  editingMemoryId = null;
  $("#memoryTitleInput").value = "";
  $("#memoryContentInput").value = "";
  $("#memoryEnabledInput").value = "true";
}

function saveMemory(event) {
  event.preventDefault();

  const title = $("#memoryTitleInput").value.trim() || "未命名记忆";
  const content = $("#memoryContentInput").value.trim();
  const enabled = $("#memoryEnabledInput").value === "true";

  if (!content) {
    alert("记忆内容不能为空。");
    return;
  }

  if (editingMemoryId) {
    state.memories = state.memories.map(memory => {
      if (memory.id !== editingMemoryId) return memory;
      return { ...memory, title, content, enabled };
    });
  } else {
    state.memories.unshift({
      id: makeId(),
      title,
      content,
      enabled,
      source: "user"
    });
  }

  clearMemoryForm();
  renderMemoryGrid();
  renderHeader();
  saveState();
  showToast("记忆已保存");
}

function renderMemoryGrid() {
  const grid = $("#memoryGrid");

  if (!state.memories.length) {
    grid.innerHTML = '<div class="status">还没有记忆卡片。</div>';
    return;
  }

  grid.innerHTML = state.memories.map(memory => `
    <div class="memory-card ${memory.enabled ? "" : "off"}">
      <div class="memory-title">${escapeHtml(memory.title)}</div>
      <div class="memory-content">${escapeHtml(memory.content)}</div>
      <div class="status">${memory.enabled ? "已启用" : "已停用"} · ${memory.source === "assistant" ? "AI 添加" : "手动添加"}</div>
      <div class="memory-actions">
        <button class="btn" onclick="editMemory('${memory.id}')">编辑</button>
        <button class="btn" onclick="toggleMemory('${memory.id}')">${memory.enabled ? "停用" : "启用"}</button>
        <button class="btn btn-danger" onclick="deleteMemory('${memory.id}')">删除</button>
      </div>
    </div>
  `).join("");
}

function editMemory(id) {
  const memory = state.memories.find(item => item.id === id);
  if (!memory) return;

  editingMemoryId = id;
  $("#memoryTitleInput").value = memory.title;
  $("#memoryContentInput").value = memory.content;
  $("#memoryEnabledInput").value = String(Boolean(memory.enabled));
}

function toggleMemory(id) {
  state.memories = state.memories.map(memory => {
    if (memory.id !== id) return memory;
    return { ...memory, enabled: !memory.enabled };
  });

  renderMemoryGrid();
  renderHeader();
  saveState();
}

function deleteMemory(id) {
  if (!confirm("确定删除这张记忆卡片吗？")) return;

  state.memories = state.memories.filter(memory => memory.id !== id);

  renderMemoryGrid();
  renderHeader();
  saveState();
}

async function aiOrganizeMemory() {
  const chat = currentChat();

  if (!chat.messages.length) {
    showToast("当前对话还没有内容");
    return;
  }

  const settings = state.settings;

  if (!settings.apiUrl || !settings.apiKey || !settings.model) {
    alert("请先在设置里填写 API URL、Key 和模型名。");
    return;
  }

  const button = $("#aiMemoryBtn");
  button.disabled = true;
  button.textContent = "整理中";

  const memorySummary = state.memories.map(memory => {
    return "id:" + memory.id + "\ntitle:" + memory.title + "\ncontent:" + memory.content + "\nenabled:" + memory.enabled;
  }).join("\n---\n") || "无";

  const stageStart = Number(chat.stageStartIndex || 0);

  const conversation = chat.messages
    .slice(stageStart)
    .filter(message => message.role === "user" || message.role === "assistant")
    .slice(-30)
    .map(message => "[" + message.role + "] " + textFromContent(message.content).slice(0, 700))
    .join("\n\n");

  const prompt = `
请分析当前阶段对话，整理用户长期有用的偏好、项目背景、固定要求。

你可以新增、更新或删除记忆卡片。

当前已有记忆：
${memorySummary}

当前阶段对话：
${conversation}

请只返回 JSON 数组，不要解释，不要 Markdown，不要代码块。格式如下：
[
  {"op":"add","title":"标题","content":"内容"},
  {"op":"update","id":"已有记忆id","title":"新标题","content":"新内容"},
  {"op":"delete","id":"已有记忆id"}
]

如果没有需要修改的记忆，请返回 []。
`.trim();

  try {
    abortController = new AbortController();

    const response = await callApi([
      { role: "user", content: prompt }
    ], false);

    const text = await response.text();
    let data = null;

    try {
      data = JSON.parse(text);
    } catch (error) {}

    if (!response.ok) {
      throw new Error(data && data.error ? data.error.message : text);
    }

    const reply =
      data &&
      data.choices &&
      data.choices[0] &&
      data.choices[0].message
        ? data.choices[0].message.content
        : "";

    const match = reply.match(/\[[\s\S]*\]/);

    if (!match) {
      throw new Error("AI 没有返回有效 JSON。");
    }

    const operations = JSON.parse(match[0]);

    let added = 0;
    let updated = 0;
    let deleted = 0;

    operations.forEach(operation => {
      if (operation.op === "add" && operation.content) {
        state.memories.unshift({
          id: makeId(),
          title: operation.title || "未命名记忆",
          content: operation.content,
          enabled: true,
          source: "assistant"
        });
        added++;
      }

      if (operation.op === "update" && operation.id) {
        state.memories = state.memories.map(memory => {
          if (memory.id !== operation.id) return memory;

          return {
            ...memory,
            title: operation.title || memory.title,
            content: operation.content || memory.content,
            source: memory.source || "assistant"
          };
        });
        updated++;
      }

      if (operation.op === "delete" && operation.id) {
        state.memories = state.memories.filter(memory => memory.id !== operation.id);
        deleted++;
      }
    });

    renderMemoryGrid();
    renderHeader();
    saveState();
    showToast("整理完成：新增 " + added + "，更新 " + updated + "，删除 " + deleted);
  } catch (error) {
    alert("AI 整理记忆失败：\n" + error.message);
  } finally {
    abortController = null;
    button.disabled = false;
    button.textContent = "AI 整理记忆";
  }
}

async function addImages(files) {
  const imageFiles = Array.from(files).filter(file => file.type.startsWith("image/"));

  for (const file of imageFiles) {
    if (file.size > 5 * 1024 * 1024) {
      showToast("图片超过 5MB，已跳过");
      continue;
    }

    const url = await fileToDataUrl(file);
    pendingImages.push({ name: file.name, url });
  }

  renderImagePreview();
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderImagePreview() {
  $("#imagePreview").innerHTML = pendingImages.map((image, index) => `
    <div class="thumb">
      <img src="${escapeHtml(image.url)}" alt="${escapeHtml(image.name)}" />
      <button onclick="removeImage(${index})">×</button>
    </div>
  `).join("");
}

function removeImage(index) {
  pendingImages.splice(index, 1);
  renderImagePreview();
}

function autoResizeInput() {
  const input = $("#promptInput");
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 190) + "px";
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");

  link.href = url;
  link.download = "AI-Chat-Backup-" + new Date().toISOString().slice(0, 10) + ".json";
  link.click();

  URL.revokeObjectURL(url);
  showToast("已导出备份");
}

function importData(file) {
  const reader = new FileReader();

  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);

      if (!imported.settings || !Array.isArray(imported.chats)) {
        throw new Error("格式不对");
      }

      const base = defaultState();

      state = {
        ...base,
        ...imported,
        settings: { ...base.settings, ...(imported.settings || {}) },
        memories: Array.isArray(imported.memories) ? imported.memories : [],
        chats: Array.isArray(imported.chats) ? imported.chats.map(normalizeChat) : []
      };

      ensureChat();
      render();
      showToast("导入成功");
    } catch (error) {
      alert("导入失败：这个文件不是有效备份。");
    }
  };

  reader.readAsText(file);
}

function resetAll() {
  if (!confirm("确定重置所有本地数据吗？这会删除设置、聊天和记忆。建议先导出备份。")) return;

  localStorage.removeItem(STORE_KEY);
  state = defaultState();
  pendingImages = [];
  render();
  showToast("已重置");
}

function closeSidebar() {
  $("#sidebar").classList.remove("open");
}

$("#newChatBtn").addEventListener("click", newChat);
$("#settingsBtn").addEventListener("click", openSettings);
$("#memoryBtn").addEventListener("click", openMemory);
$("#themeBtn").addEventListener("click", () => {
  state.theme = state.theme === "dark" ? "light" : "dark";
  render();
});
$("#resetBtn").addEventListener("click", resetAll);

$("#openSideBtn").addEventListener("click", () => {
  $("#sidebar").classList.add("open");
});

$("#chatList").addEventListener("click", event => {
  const item = event.target.closest(".chat-item");
  if (!item) return;

  state.currentChatId = item.dataset.chatId;
  render();
  closeSidebar();
});

$("#titleInput").addEventListener("change", () => {
  const chat = currentChat();

  chat.title = $("#titleInput").value.trim() || "新对话";
  chat.updatedAt = new Date().toISOString();

  render();
});

$("#stageBtn").addEventListener("click", startNewStage);
$("#regenBtn").addEventListener("click", regenerateReply);
$("#deleteBtn").addEventListener("click", deleteCurrentChat);
$("#sendBtn").addEventListener("click", sendMessage);

$("#promptInput").addEventListener("input", autoResizeInput);
$("#promptInput").addEventListener("keydown", event => {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
});

$("#promptInput").addEventListener("paste", event => {
  const files = Array.from(event.clipboardData.files || []);
  const imageFiles = files.filter(file => file.type.startsWith("image/"));

  if (imageFiles.length) {
    addImages(imageFiles);
  }
});

$("#imageBtn").addEventListener("click", () => $("#imageInput").click());
$("#imageInput").addEventListener("change", event => {
  addImages(event.target.files);
  event.target.value = "";
});

$("#importFile").addEventListener("change", event => {
  const file = event.target.files[0];

  if (file) {
    importData(file);
  }

  event.target.value = "";
});

$("#closeSettingsBtn").addEventListener("click", () => $("#settingsDialog").close());
$("#settingsForm").addEventListener("submit", saveSettings);
$("#testBtn").addEventListener("click", testConnection);
$("#exportBtn").addEventListener("click", exportData);
$("#importBtn").addEventListener("click", () => $("#importFile").click());

$("#closeMemoryBtn").addEventListener("click", () => $("#memoryDialog").close());
$("#memoryForm").addEventListener("submit", saveMemory);
$("#cancelMemoryEditBtn").addEventListener("click", clearMemoryForm);
$("#aiMemoryBtn").addEventListener("click", aiOrganizeMemory);

document.addEventListener("click", event => {
  const sidebar = $("#sidebar");
  const openBtn = $("#openSideBtn");

  if (
    sidebar.classList.contains("open") &&
    !sidebar.contains(event.target) &&
    event.target !== openBtn
  ) {
    closeSidebar();
  }
});

window.copyMessage = copyMessage;
window.deleteMessage = deleteMessage;
window.editMessage = editMessage;
window.replyFromMessage = replyFromMessage;
window.saveMessageAsMemory = saveMessageAsMemory;
window.removeImage = removeImage;
window.editMemory = editMemory;
window.toggleMemory = toggleMemory;
window.deleteMemory = deleteMemory;
window.renameChat = renameChat;
window.deleteChatById = deleteChatById;

render();
</script>
</body>
</html>
